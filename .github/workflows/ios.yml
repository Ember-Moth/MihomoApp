name: Build iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Aureline/**"
      - "Aureline.iOS/**"
      - "Aureline.iOS.PacketTunnel/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "global.json"
      - "Aureline.slnx"
      - ".gitmodules"
      - "libclash"
      - "libclash/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "Aureline/**"
      - "Aureline.iOS/**"
      - "Aureline.iOS.PacketTunnel/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "global.json"
      - "Aureline.slnx"
      - ".gitmodules"
      - "libclash"
      - "libclash/**"
      - ".github/workflows/ios.yml"

jobs:
  build:
    name: Build Aureline iOS
    runs-on: macos-26
    permissions:
      contents: read

    env:
      DOTNET_VERSION: "11.0.100-preview.4.26230.115"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.LIBCLASH_ARTIFACT_TOKEN || github.token }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: libclash/go.mod
          cache-dependency-path: libclash/go.sum

      - name: Show toolchains
        run: |
          xcodebuild -version
          dotnet --info
          go version

      - name: Install iOS workload
        run: dotnet workload install ios

      - name: Build libclash iOS native libraries
        shell: bash
        run: |
          set -euo pipefail
          BUILD_SIMULATOR_X64=0 \
          OUT_DIR="$PWD/Aureline.iOS.PacketTunnel/NativeLibraries/ios" \
          bash libclash/scripts/build-carchive-ios.sh

      - name: Restore device
        run: dotnet restore Aureline.iOS/Aureline.iOS.csproj -r ios-arm64

      - name: Build unsigned iOS device app
        run: |
          dotnet build Aureline.iOS/Aureline.iOS.csproj \
            -c Release \
            -f net11.0-ios \
            -r ios-arm64 \
            -p:LibClashIosNativeArchive="$PWD/Aureline.iOS.PacketTunnel/NativeLibraries/ios/iphoneos-arm64/libclash.a" \
            -p:Platform=iPhone \
            -p:SdkIsSimulator=false \
            -p:_SdkIsSimulator=false \
            -p:CodesignKey=- \
            -p:CodesignProvision= \
            -p:AurelineDisableIosEntitlements=true \
            -p:AurelineEnableNativeAot=false \
            -p:PublishAot=false \
            -p:PublishReadyToRun=false \
            -p:RunAOTCompilation=false \
            -p:MtouchInterpreter=all \
            -p:UseSharedCompilation=false \
            -nr:false

      - name: Package unsigned iOS device IPA
        shell: bash
        run: |
          set -euo pipefail

          device_app=""
          while IFS= read -r app_path; do
            case "$app_path" in
              */net11.0-ios/ios-arm64/*.app)
                device_app="$app_path"
                break
                ;;
            esac
          done < <(find Aureline.iOS/bin -type d -name '*.app' 2>/dev/null | sort)

          if [[ -z "$device_app" ]]; then
            echo "No ios-arm64 .app bundle found" >&2
            find Aureline.iOS/bin -type d -name '*.app' -print 2>/dev/null || true
            exit 1
          fi

          rm -rf artifacts/ios-unsigned
          mkdir -p artifacts/ios-unsigned/Payload
          ditto "$device_app" "artifacts/ios-unsigned/Payload/$(basename "$device_app")"
          (
            cd artifacts/ios-unsigned
            zip -qry Aureline-ios-arm64-unsigned.ipa Payload
          )
          shasum -a 256 artifacts/ios-unsigned/Aureline-ios-arm64-unsigned.ipa \
            > artifacts/ios-unsigned/SHA256SUMS

      - name: Clean iOS intermediates before simulator build
        shell: bash
        run: |
          set -euo pipefail

          rm -rf \
            Aureline.iOS/obj/Release/net11.0-ios \
            Aureline.iOS.PacketTunnel/obj/Release/net11.0-ios

      - name: Restore simulator
        run: dotnet restore Aureline.iOS/Aureline.iOS.csproj -r iossimulator-arm64

      - name: Build unsigned iOS simulator app
        run: |
          dotnet build Aureline.iOS/Aureline.iOS.csproj \
            -c Release \
            -f net11.0-ios \
            -r iossimulator-arm64 \
            -p:LibClashIosNativeArchive="$PWD/Aureline.iOS.PacketTunnel/NativeLibraries/ios/iphonesimulator/libclash.a" \
            -p:EnableCodeSigning=false \
            -p:UseSharedCompilation=false \
            -nr:false

      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aureline-ios
          path: |
            artifacts/ios-unsigned/Aureline-ios-arm64-unsigned.ipa
            artifacts/ios-unsigned/SHA256SUMS
            Aureline.iOS/bin/iPhone/Release/net11.0-ios/ios-arm64/**/*.app
            Aureline.iOS/bin/Release/net11.0-ios/ios-arm64/**/*.app
            Aureline.iOS/bin/iPhoneSimulator/Release/net11.0-ios/iossimulator-arm64/**/*.app
            Aureline.iOS/bin/Release/net11.0-ios/iossimulator-arm64/publish/**/*.app
            Aureline.iOS/bin/Release/net11.0-ios/iossimulator-arm64/**/*.app
          if-no-files-found: warn
          retention-days: 14
